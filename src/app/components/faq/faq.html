<section class="faq-wrap" id="faq">
  <div class="container faq-container">
    <div class="section-header">
      <h2>Frequently Asked Questions</h2>
      <p>Have questions about bookings, pricing, or safety? We have answers.</p>
    </div>

    <div class="faq-list">
      <div class="faq-item" *ngFor="let item of faqs(); let i = index" [class.open]="item.isOpen">
        <button class="faq-question" (click)="toggleFaq(i)">
          <span>{{item.question}}</span>
          <span class="chevron-wrapper">
            <svg class="chevron-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </span>
        </button>
        <div class="faq-answer">
          <p>{{item.answer}}</p>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="reviews-wrap" id="reviews">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle">Customer Trust</span>
      <h2>Google Reviews & Travel Stories</h2>
      <p>Real experiences from verified travelers across major Tamil Nadu routes.</p>
    </div>

    <div class="reviews-grid">
      <div class="review-card glass-panel" *ngFor="let item of reviews">
        <div class="review-top-bar">
          <div class="google-badge-wrap">
            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="google-text">Google Review</span>
          </div>
          <span class="verified-badge">✓ Verified</span>
        </div>

        <div class="review-header">
          <div class="avatar-placeholder">
            <span>{{item.name.substring(0, 1)}}</span>
          </div>
          <div class="review-meta">
            <h3>{{item.name}}</h3>
            <span class="user-location">{{item.location}}, Tamil Nadu</span>
          </div>
        </div>

        <div class="review-rating-bar">
          <div class="stars">
            <span *ngFor="let star of [1,2,3,4,5]">★</span>
          </div>
          <span class="rating-time">2 days ago</span>
        </div>

        <div class="review-body">
          <span class="trip-badge-new">📍 {{item.tripType}}</span>
          <p class="review-text">"{{item.comment}}"</p>
        </div>
      </div>
    </div>
  </div>
</section>

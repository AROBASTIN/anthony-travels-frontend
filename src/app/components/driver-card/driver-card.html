<div class="driver-card" *ngIf="driver">
  <div class="driver-header">
    <div class="driver-avatar">
      <span class="avatar-letter">{{ driver.name[0] }}</span>
      <span class="status-indicator" [class.available]="driver.status === 'available'" [class.busy]="driver.status === 'busy'"></span>
    </div>
    <div class="driver-info">
      <div class="name-badge">
        <h4>{{ driver.name }}</h4>
        <span class="verified-badge" *ngIf="driver.verified" title="Verified Driver">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="badge-icon">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          Verified
        </span>
      </div>
      <p class="experience-text">{{ driver.experience }} Years Experience</p>
    </div>
  </div>

  <div class="driver-details">
    <div class="detail-row">
      <span class="label">Languages:</span>
      <span class="value">{{ driver.languages.join(', ') }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Rating:</span>
      <span class="value rating-value">
        <span class="star">★</span> {{ driver.rating }}
      </span>
    </div>
  </div>
</div>
